<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Online - Water World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #001a33; color: white; user-select: none; }
        canvas { display: block; background: radial-gradient(circle, #002b4d 0%, #001a33 100%); }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .menu { background: rgba(0, 43, 77, 0.9); padding: 30px; border-radius: 20px; border: 2px solid #00ccff; text-align: center; box-shadow: 0 0 20px #00ccff; }
        
        input[type="text"] { padding: 10px; border-radius: 5px; border: none; width: 200px; margin-bottom: 10px; outline: none; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; vertical-align: middle; }
        
        button { background: #00ccff; border: none; padding: 10px 20px; color: #001a33; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0099cc; transform: scale(1.05); }

        #level-up { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; }
        .card-container { display: flex; gap: 20px; }
        .card { background: #004080; border: 3px solid #00ccff; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; width: 150px; text-align: center; }
        .card:hover { transform: translateY(-10px); background: #0059b3; box-shadow: 0 0 15px #00ccff; }

        #stats { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 5; }
        .xp-bar { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #xp-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="stats">
        <b id="player-name-ui">Завантаження...</b>
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <small>Рівень: <span id="lvl-ui">1</span></small>
    </div>

    <div id="ui">
        <div class="menu" id="start-menu">
            <h1>EVOLUTION</h1>
            <input type="text" id="username" placeholder="Твоє ім'я" maxlength="12"><br><br>
            <label>Колір:</label> <input type="color" id="usercolor" value="#00ffcc"><br><br>
            <button onclick="startGame()">ПОЧАТИ ЕВОЛЮЦІЮ</button>
        </div>
    </div>

    <div id="level-up">
        <div class="card-container">
            <div class="card" onclick="chooseUpgrade('speed')">
                <h3>⚡ Швидкість</h3>
                <p>+0.8 до руху</p>
            </div>
            <div class="card" onclick="chooseUpgrade('size')">
                <h3>🍕 Розмір</h3>
                <p>+5 до радіусу</p>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const xpFill = document.getElementById('xp-fill');
    const lvlUi = document.getElementById('lvl-ui');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player, entities = [], particles = [];
    let isRunning = false;
    let isInvincible = false;
    let camera = { x: 0, y: 0 };
    let mouse = { x: 0, y: 0 };
    const WORLD_SIZE = 4000;

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.color = color;
            this.size = Math.random() * 4 + 2;
            this.speedX = (Math.random() - 0.5) * 4;
            this.speedY = (Math.random() - 0.5) * 4;
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.life -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Entity {
        constructor(id, x, y, radius, color, name, isBot = false) {
            this.id = id;
            this.x = x; this.y = y;
            this.radius = radius;
            this.color = color;
            this.name = name;
            this.isBot = isBot;
            this.speed = 2.5;
            this.level = 1;
            this.xp = 0;
            this.angle = Math.random() * Math.PI * 2;
            this.targetAngle = this.angle;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Ефект прозорості при безсмерті
            if (this.id === 'me' && isInvincible) ctx.globalAlpha = 0.5;

            let pulse = Math.sin(Date.now() * 0.005) * 2;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius + pulse, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fill();
            
            ctx.rotate(this.angle);
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(this.radius * 0.5, -this.radius * 0.3, this.radius * 0.22, 0, Math.PI * 2);
            ctx.arc(this.radius * 0.5, this.radius * 0.3, this.radius * 0.22, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
            ctx.globalAlpha = 1;
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.font = "bold 13px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.name, this.x, this.y - this.radius - 15);
        }

        update() {
            if (this.isBot) {
                let nearest = null;
                let minDist = 400;
                let danger = null;

                // AI не бачить гравця, якщо той в меню прокачки
                let targets = [...entities];
                if (!isInvincible) targets.push(player);

                targets.forEach(other => {
                    if (other === this || !other) return;
                    let d = Math.hypot(this.x - other.x, this.y - other.y);
                    
                    if (d < 300 && other.radius > this.radius * 1.1) danger = other;
                    else if (d < minDist && other.radius < this.radius) {
                        minDist = d; nearest = other;
                    }
                });

                if (danger) this.targetAngle = Math.atan2(this.y - danger.y, this.x - danger.x);
                else if (nearest) this.targetAngle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                else if (Math.random() < 0.01) this.targetAngle += (Math.random() - 0.5) * 2;

                let diff = this.targetAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * 0.08;

                this.x += Math.cos(this.angle) * (this.speed * 0.6);
                this.y += Math.sin(this.angle) * (this.speed * 0.6);

                if (this.x < 0 || this.x > WORLD_SIZE) this.targetAngle = Math.PI - this.targetAngle;
                if (this.y < 0 || this.y > WORLD_SIZE) this.targetAngle = -this.targetAngle;
            }
        }
    }

    function findSafeSpawn() {
        let attempts = 0;
        while(attempts < 100) {
            let rx = Math.random() * (WORLD_SIZE - 200) + 100;
            let ry = Math.random() * (WORLD_SIZE - 200) + 100;
            let safe = true;
            
            [...entities].forEach(e => {
                if(Math.hypot(rx - e.x, ry - e.y) < 500) safe = false;
            });
            
            if(safe) return {x: rx, y: ry};
            attempts++;
        }
        return {x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE};
    }

    function spawnPlayer() {
        const spawn = findSafeSpawn();
        const nameInput = document.getElementById('username').value;
        const color = document.getElementById('usercolor').value;
        
        if (!player) {
            player = new Entity('me', spawn.x, spawn.y, 20, color, nameInput || "Microbe");
        } else {
            player.x = spawn.x;
            player.y = spawn.y;
            player.radius = Math.max(20, player.radius / 2); // Втрата розміру при смерті
            player.xp = 0;
            player.level = Math.max(1, Math.floor(player.level / 2));
        }
        document.getElementById('player-name-ui').innerText = player.name;
    }

    function startGame() {
        spawnPlayer();
        for (let i = 0; i < 65; i++) spawnBot();
        isRunning = true;
        ui.style.display = 'none';
        camera.x = player.x - canvas.width/2;
        camera.y = player.y - canvas.height/2;
        animate();
    }

    function spawnBot() {
        const names = ["Amoeba", "Virus", "Cell", "Bacteria", "Hunter", "Proto", "Cilia"];
        const spawn = findSafeSpawn();
        entities.push(new Entity(
            Math.random(), spawn.x, spawn.y, 
            12 + Math.random() * 22, 
            `hsl(${Math.random() * 360}, 60%, 50%)`, 
            names[Math.floor(Math.random() * names.length)] + " " + Math.floor(Math.random()*9),
            true
        ));
    }

    function chooseUpgrade(type) {
        if (type === 'speed') player.speed += 0.8;
        if (type === 'size') player.radius += 5;
        
        document.getElementById('level-up').style.display = 'none';
        isInvincible = false;
        isRunning = true;
    }

    function handleCollisions() {
        if (isInvincible) return;

        for (let i = entities.length - 1; i >= 0; i--) {
            let ent = entities[i];
            let d = Math.hypot(player.x - ent.x, player.y - ent.y);
            if (d < player.radius + ent.radius * 0.6) {
                if (player.radius > ent.radius) {
                    for(let k=0; k<10; k++) particles.push(new Particle(ent.x, ent.y, ent.color));
                    player.xp += 45;
                    entities.splice(i, 1);
                    spawnBot();
                    if (player.xp >= player.level * 100) {
                        player.level++; player.xp = 0;
                        isRunning = false;
                        isInvincible = true;
                        document.getElementById('level-up').style.display = 'block';
                    }
                } else {
                    // Респаун
                    for(let k=0; k<20; k++) particles.push(new Particle(player.x, player.y, player.color));
                    alert("Вас поглинули! Респаун з втратою 50% досвіду.");
                    spawnPlayer();
                }
            }
        }

        // Бійка AI
        for (let i = 0; i < entities.length; i++) {
            for (let j = i + 1; j < entities.length; j++) {
                let a = entities[i]; let b = entities[j];
                let d = Math.hypot(a.x - b.x, a.y - b.y);
                if (d < a.radius + b.radius * 0.5) {
                    let winner = a.radius > b.radius ? a : b;
                    let loser = a.radius > b.radius ? b : a;
                    winner.radius += 1.5;
                    entities = entities.filter(e => e !== loser);
                    spawnBot();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (isRunning) {
            // Рух гравця
            let targetAngle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
            player.angle = targetAngle;
            player.x += Math.cos(player.angle) * player.speed;
            player.y += Math.sin(player.angle) * player.speed;
            player.x = Math.max(0, Math.min(WORLD_SIZE, player.x));
            player.y = Math.max(0, Math.min(WORLD_SIZE, player.y));
        }

        // Плавна камера працює завжди для краси
        let targetCamX = player.x - canvas.width/2;
        let targetCamY = player.y - canvas.height/2;
        camera.x += (targetCamX - camera.x) * 0.07;
        camera.y += (targetCamY - camera.y) * 0.07;

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Малювання світу
        ctx.strokeStyle = "rgba(0, 204, 255, 0.05)";
        for(let i=0; i<=WORLD_SIZE; i+=200) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
        }

        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        entities.forEach(e => { e.update(); e.draw(); });
        player.draw();

        ctx.restore();

        if (isRunning) handleCollisions();
        
        xpFill.style.width = (player.xp / (player.level * 100) * 100) + "%";
        lvlUi.innerText = player.level;

        requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
